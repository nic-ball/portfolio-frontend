name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          # This injects the variable into the build process
          VITE_API_URL: https://api.nic-ball.co.uk/api/

      # 1. Copy the build folder to a temporary folder on VPS
      - name: Copy to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }} # Or VPS_IP depending on your secret name
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/"
          target: "/home/${{ secrets.VPS_USER }}/app/frontend_new"
          strip_components: 1

      # 2. Perform the "Atomic Swap"
      - name: Switch to New Build
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Stop if the new folder didn't arrive (Safety Check)
            if [ ! -d "~/app/frontend_new" ]; then
              echo "❌ Error: New build folder missing!"
              exit 1
            fi

            # Remove the old live folder
            rm -rf ~/app/frontend_build

            # Rename the new folder to become the live folder
            mv ~/app/frontend_new ~/app/frontend_build

            # Fix permissions (The critical step)
            chmod -R 755 ~/app/frontend_build

            echo "✅ Atomic Deploy Complete"
