name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          # This injects the variable into the build process
          VITE_API_URL: https://api.nic-ball.co.uk/api/

      # 1. Prepare a Clean Temp Directory (SSH)
      # We do this FIRST to make sure the folder exists for SCP
      - name: Prepare Temp Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Remove any existing temp folder to ensure a clean upload
            rm -rf /home/${{ secrets.VPS_USER }}/app/frontend_temp
            mkdir -p /home/${{ secrets.VPS_USER }}/app/frontend_temp

      # 2. Copy Files to the Temp Directory (SCP)
      - name: Copy to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/home/${{ secrets.VPS_USER }}/app/frontend_temp"
          strip_components: 1

      # 3. Atomic Swap & Permissions (SSH)
      - name: Deploy and Reload
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Check if upload worked
            if [ -z "$(ls -A /home/${{ secrets.VPS_USER }}/app/frontend_temp)" ]; then
               echo "❌ Error: Temp folder is empty! SCP failed."
               exit 1
            fi

            # Remove the old live folder
            rm -rf /home/${{ secrets.VPS_USER }}/app/frontend_build

            # Move temp to live
            mv /home/${{ secrets.VPS_USER }}/app/frontend_temp /home/${{ secrets.VPS_USER }}/app/frontend_build

            # Fix Permissions (Crucial!)
            chmod -R 755 /home/${{ secrets.VPS_USER }}/app/frontend_build

            echo "✅ Deployment Complete"
